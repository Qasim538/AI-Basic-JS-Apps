<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Mood Detector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <p>AI Mood Detector</p>
      <h2>How are you feeling today?</h2>

      <input
        type="text"
        id="moodInput"
        placeholder="Type happy, sad, tired..."
      >

      <button id="detectBtn">Analyze Mood</button>

      <div id="result">
        <span class="emoji">🤖</span>
        <h1>AI is waiting to analyze your mood...</h1>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
