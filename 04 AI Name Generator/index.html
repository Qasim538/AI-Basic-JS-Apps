<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Name Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>AI Name Generator</h1>
      <p>Choose a category and let AI create a name</p>

      <select id="category">
        <option value="startup">Tech Startup</option>
        <option value="youtube">YouTube Channel</option>
        <option value="app">Mobile App</option>
        <option value="brand">Personal Brand</option>
      </select>

      <button id="generateBtn">Generate Name</button>

      <div id="result">
        <span class="emoji">🤖</span>
        <p>Your AI-generated name will appear here...</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
