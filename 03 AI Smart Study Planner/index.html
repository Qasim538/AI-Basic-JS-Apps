<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Study Planner AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Smart Study Planner AI</h1>
      <p>What subject do you want to study today?</p>

      <input
        type="text"
        id="subjectInput"
        placeholder="Try Math, Coding, English..."
      >

      <button id="planBtn">Generate Study Plan</button>

      <div id="result">
        <span class="emoji">📚</span>
        <p>Your personalized AI study plan will appear here...</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
